<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white shadow-md rounded-xl w-full max-w-sm px-8 py-10">

    <!-- Branding -->
    <div class="text-center mb-7">
      <h1 class="text-4xl font-serif text-green-800 tracking-tight">Tokaboard</h1>
      
    </div>

    <!-- Form -->
    <form (ngSubmit)="login()" class="space-y-5">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@company.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-transparent transition"
          required
        />
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <a href="#" class="text-xs text-green-900 hover:text-green-700 transition">Forgot password?</a>
        </div>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-transparent transition"
          required
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-green-700 hover:bg-green-700 active:bg-green-800 text-white py-2.5 rounded-lg font-semibold text-sm tracking-wide transition-colors duration-150 mt-1"
      >
        Sign In
      </button>

    </form>

    <!-- Register Link -->
    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/register" class="text-green-600 font-serif hover:text-green-700 transition">Sign up free</a>
    </p>

  </div>
</div>
