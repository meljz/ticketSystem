<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white shadow-md rounded-xl w-full max-w-sm px-8 py-10">

    <div class="text-center mb-7">
      <h1 class="text-4xl font-serif text-green-800 tracking-tight mb-2">Tokaboard</h1>
      <p class="text-sm text-gray-500">Create your account</p>
    </div>

    <form (ngSubmit)="register()" class="space-y-5">
      
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          placeholder="Enter your username"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-transparent transition"
          required
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@company.com"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-transparent transition"
          required
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Create a password"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-transparent transition"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full bg-green-700 hover:bg-green-800 active:bg-green-900 text-white py-2.5 rounded-lg font-semibold text-sm tracking-wide transition-colors duration-150 mt-1"
      >
        Register
      </button>

    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a routerLink="/login" class="text-green-600 font-serif hover:text-green-700 transition">Login here</a>
    </p>

  </div>
</div>
